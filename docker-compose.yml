version: '3.8'

services:

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: taskmanager-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'       # expose for local tools like MongoDB Compass
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: taskmanager
    healthcheck:
      # ✅ Fixed: added localhost:27017 so mongosh knows where to connect
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/taskmanager --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app-network

  # ── Node.js Backend ────────────────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: taskmanager-server
    restart: unless-stopped
    ports:
      - '5000:5000'         # expose for direct API testing (Postman etc.)
    depends_on:
      mongo:
        condition: service_healthy   # waits until mongo passes healthcheck
    environment:
      NODE_ENV: production
      PORT: '5000'
      # 'mongo' matches the service name above — Docker DNS resolves it
      MONGO_URI: mongodb://mongo:27017/taskmanager
      JWT_SECRET: ${JWT_SECRET:-change_this_to_a_secure_random_secret}
    networks:
      - app-network

  # ── React Frontend (Nginx) ─────────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: taskmanager-client
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - server
    networks:
      - app-network         # ✅ must be same network so nginx can reach 'server'

# ── Named Volume ───────────────────────────────────────────────────────────────
volumes:
  mongo-data:
    driver: local

# ── Shared Network ─────────────────────────────────────────────────────────────
networks:
  app-network:
    driver: bridge