apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskmanager-server
  labels:
    app: taskmanager-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: taskmanager-server
  template:
    metadata:
      labels:
        app: taskmanager-server
    spec:
      containers:
      - name: server
        image: zsthesev/taskmanager-server:v1
        ports:
        - containerPort: 5000
        env:
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: taskmanager-secrets
              key: mongo-uri
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: taskmanager-secrets
              key: jwt-secret
        - name: PORT
          value: "5000"